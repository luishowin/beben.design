<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram of Sprite's two brains feeding one chat bubble">
  <defs>
    <style>
      .mono { font-family: 'IBM Plex Mono', Consolas, monospace; letter-spacing: 0.08em; }
      .gray { fill: #8A8A8A; }
      .gray-stroke { stroke: #8A8A8A; }
      .yellow { fill: #FFC710; }
      .yellow-stroke { stroke: #FFC710; }
    </style>
  </defs>

  <!-- faint grid -->
  <g class="gray-stroke" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200"/>
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630"/>
  </g>

  <!-- brain one: pattern engine -->
  <g>
    <rect x="120" y="150" width="300" height="130" class="gray-stroke" stroke-width="2" opacity="0.85"/>
    <text x="150" y="196" class="mono gray" font-size="20">BRAIN 01</text>
    <text x="150" y="230" class="mono gray" font-size="26" opacity="0.9">pattern engine</text>
    <text x="150" y="260" class="mono gray" font-size="16" opacity="0.7">offline &#183; always on</text>
  </g>

  <!-- brain two: worker + llm -->
  <g>
    <rect x="120" y="350" width="300" height="130" class="yellow-stroke" stroke-width="2"/>
    <text x="150" y="396" class="mono yellow" font-size="20">BRAIN 02</text>
    <text x="150" y="430" class="mono gray" font-size="26" opacity="0.9">worker + llm</text>
    <text x="150" y="460" class="mono gray" font-size="16" opacity="0.7">live &#183; key stays server-side</text>
  </g>

  <!-- routing lines -->
  <g class="gray-stroke" stroke-width="2" opacity="0.7">
    <path d="M420 215 H540 V300 H660"/>
    <path d="M420 415 H540 V330 H660" class="yellow-stroke"/>
  </g>
  <!-- fallback arrow between brains -->
  <g class="gray-stroke" stroke-width="1.5" opacity="0.55" stroke-dasharray="6 6">
    <path d="M270 350 V280"/>
  </g>
  <text x="290" y="322" class="mono gray" font-size="15" opacity="0.7">falls back</text>

  <!-- chat bubble -->
  <g>
    <rect x="660" y="200" width="420" height="230" rx="6" class="gray-stroke" stroke-width="2.5" opacity="0.9"/>
    <path d="M720 430 L700 480 L780 430" class="gray-stroke" stroke-width="2.5" opacity="0.9" fill="none"/>
    <!-- pixel sprite face -->
    <g class="yellow">
      <rect x="710" y="250" width="18" height="18"/>
      <rect x="764" y="250" width="18" height="18"/>
      <rect x="710" y="304" width="18" height="18"/>
      <rect x="728" y="322" width="36" height="18"/>
      <rect x="764" y="304" width="18" height="18"/>
    </g>
    <!-- reply lines -->
    <g class="gray" opacity="0.75">
      <rect x="830" y="256" width="200" height="12"/>
      <rect x="830" y="286" width="160" height="12"/>
      <rect x="830" y="316" width="180" height="12"/>
    </g>
    <!-- chips -->
    <g>
      <rect x="830" y="360" width="90" height="30" class="gray-stroke" stroke-width="1.5" opacity="0.6"/>
      <rect x="936" y="360" width="90" height="30" class="gray-stroke" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>

  <text x="660" y="530" class="mono gray" font-size="17" opacity="0.7">one widget &#183; two brains &#183; zero error states</text>
</svg>
