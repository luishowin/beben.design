<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Snake — Beben Arcade</title>
    <meta name="robots" content="noindex">

    <meta name="theme-color" content="#141414">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arcade">
    <link rel="manifest" href="/games/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/games/icons/apple-touch-icon-180.png">
    <link rel="icon" href="/games/icons/icon-192.png" type="image/png">

    <link rel="stylesheet" href="../arcade.css">
    <script src="../arcade.js"></script>
</head>
<body>

<main class="arc-stage"><canvas id="game" class="arc-surface"></canvas></main>

<script>
(function () {
    'use strict';

    var COLS = 21, ROWS = 21;
    var START_STEP = 120, MIN_STEP = 60, STEP_PER_FOOD = 2;

    var canvas = document.getElementById('game');
    var view = Arcade.fitCanvas(canvas, { aspect: 1, maxW: 480 });

    var snake, dir, queue, food, score, stepMs, acc, alive;

    function reset() {
        var cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
        snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
        dir = { x: 1, y: 0 };
        queue = [];
        score = 0;
        stepMs = START_STEP;
        acc = 0;
        alive = true;
        spawnFood();
        Arcade.ui.setScore('000');
    }

    function spawnFood() {
        var free = [];
        for (var y = 0; y < ROWS; y++) {
            for (var x = 0; x < COLS; x++) {
                var taken = snake.some(function (s) { return s.x === x && s.y === y; });
                if (!taken) free.push({ x: x, y: y });
            }
        }
        food = free[Math.floor(Math.random() * free.length)];
    }

    function pushDir(d) {
        if (!alive) return;
        var last = queue.length ? queue[queue.length - 1] : dir;
        if (d.x === -last.x && d.y === -last.y) return;   // no 180s
        if (d.x === last.x && d.y === last.y) return;
        if (queue.length < 2) {
            queue.push(d);
            Arcade.audio.play('move');
        }
    }

    var DIRS = {
        up: { x: 0, y: -1 }, down: { x: 0, y: 1 },
        left: { x: -1, y: 0 }, right: { x: 1, y: 0 }
    };

    Arcade.swipe(document.body, function (d) { pushDir(DIRS[d]); });

    document.addEventListener('keydown', function (e) {
        var map = {
            ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
            w: 'up', s: 'down', a: 'left', d: 'right',
            W: 'up', S: 'down', A: 'left', D: 'right'
        };
        var d = map[e.key];
        if (d) { e.preventDefault(); pushDir(DIRS[d]); }
    });

    function tick() {
        if (queue.length) dir = queue.shift();
        var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        var hitWall = head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS;
        var hitSelf = snake.some(function (s, i) {
            // tail cell vacates this tick unless we grow into food
            if (i === snake.length - 1 && !(head.x === food.x && head.y === food.y)) return false;
            return s.x === head.x && s.y === head.y;
        });
        if (hitWall || hitSelf) { die(); return; }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++;
            stepMs = Math.max(MIN_STEP, stepMs - STEP_PER_FOOD);
            Arcade.ui.setScore(String(score).padStart(3, '0'));
            Arcade.audio.play('coin');
            Arcade.haptics.buzz('light');
            spawnFood();
        } else {
            snake.pop();
        }
    }

    function die() {
        alive = false;
        Arcade.audio.play('boom');
        Arcade.haptics.buzz('error');
        var res = Arcade.scores.submit('snake', score);
        loop.pause();
        Arcade.ui.gameOver({
            score: score, best: res.best, isNew: res.isNew,
            onReplay: function () { reset(); loop.resume(); }
        });
    }

    function render() {
        var p = Arcade.palette();
        var ctx = view.ctx;
        var cell = view.w / COLS;

        ctx.fillStyle = p.bgSoft;
        ctx.fillRect(0, 0, view.w, view.h);

        // checker
        ctx.fillStyle = p.gridLine;
        for (var y = 0; y < ROWS; y++) {
            for (var x = (y % 2); x < COLS; x += 2) {
                ctx.fillRect(x * cell, y * cell, cell, cell);
            }
        }

        // food
        var pad = cell * 0.18;
        ctx.fillStyle = p.red;
        ctx.fillRect(food.x * cell + pad, food.y * cell + pad, cell - pad * 2, cell - pad * 2);

        // snake
        for (var i = snake.length - 1; i >= 0; i--) {
            var s = snake[i];
            var g = cell * 0.06;
            ctx.fillStyle = i === 0 ? p.headers : p.yellow;
            ctx.fillRect(s.x * cell + g, s.y * cell + g, cell - g * 2, cell - g * 2);
        }
        // eye on head
        var h = snake[0];
        ctx.fillStyle = p.red;
        var eye = Math.max(2, cell * 0.16);
        ctx.fillRect(
            (h.x + 0.5 + dir.x * 0.22) * cell - eye / 2,
            (h.y + 0.5 + dir.y * 0.22) * cell - eye / 2,
            eye, eye
        );
    }

    var loop = Arcade.loop({
        update: function (dt) {
            if (!alive) return;
            acc += dt * 1000;
            while (acc >= stepMs) { acc -= stepMs; tick(); }
        },
        render: render
    });

    Arcade.init({
        slug: 'snake',
        title: 'Snake',
        onPause: function () { loop.pause(); },
        onResume: function () { loop.resume(); }
    });

    reset();
    loop.start();
})();
</script>

</body>
</html>
